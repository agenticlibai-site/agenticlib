name: Sales Visibility Collection (GPT)

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Trigger sales visibility collection
        run: |
          curl --max-time 310 --fail-with-body \
            "https://agenticlib.com/api/cron/sales-visibility-collection?model=gpt-4o-mini" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
