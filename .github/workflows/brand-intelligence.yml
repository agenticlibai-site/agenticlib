name: Brand Intelligence

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Trigger brand intelligence
        run: |
          curl --max-time 310 --fail-with-body \
            "https://agenticlib.com/api/cron/brand-intelligence" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
