name: Brand Visibility Collection (Claude)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Trigger brand visibility collection
        run: |
          curl --max-time 310 --fail-with-body \
            "https://agenticlib.com/api/cron/brand-visibility-collection?model=claude-haiku-4-5" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
