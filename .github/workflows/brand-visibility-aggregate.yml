name: Brand Visibility Aggregate

on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Trigger brand visibility aggregate
        run: |
          curl --max-time 310 --fail-with-body \
            "https://agenticlib.com/api/cron/brand-visibility-collection?aggregate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
