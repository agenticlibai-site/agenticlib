name: Sales Feature Collection (Claude)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Trigger sales feature collection (half 1)
        run: |
          curl --max-time 310 --fail-with-body \
            "https://agenticlib.com/api/cron/sales-feature-collection?model=claude-haiku-4-5&half=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Trigger sales feature collection (half 2)
        if: always()
        run: |
          curl --max-time 310 --fail-with-body \
            "https://agenticlib.com/api/cron/sales-feature-collection?model=claude-haiku-4-5&half=2" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
